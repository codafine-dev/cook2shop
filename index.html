<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cook2Shop - AI Retail Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body class="bg-light p-3">

<div class="container" style="max-width: 500px;">
    <header class="mb-4">
        <h2 class="fw-bold text-primary mb-1">🛒 Cook2Shop</h2>
        <p class="text-muted small">Étape 2 : Extraction & Capture AI</p>
    </header>

    <section class="card shadow-sm mb-4 p-3 border-0">
        <div class="input-group">
            <input type="text" id="urlInput" class="form-control" placeholder="Coller l'URL de la recette...">
            <button class="btn btn-primary" onclick="askAI()">Analyser via ChatGPT</button>
        </div>
    </section>

    <section class="mb-3 d-flex gap-2">
        <input type="date" id="dateFilter" class="form-control form-control-sm" onchange="renderRecipes()">
        <button class="btn btn-outline-secondary btn-sm" onclick="clearDateFilter()">Tous</button>
    </section>

    <main id="recipeContainer" class="row">
        </main>
</div>

<script src="app.js"></script>
</body>
</html>
