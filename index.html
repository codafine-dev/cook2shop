<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PanierRecette</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- HEADER -->
    <div class="header">
    <div class="eyebrow">Recipe · Pipeline · v4</div>
    <div class="title">PanierRecette</div>
    <div class="subtitle">URL ou texte de recette → liste de courses → panier</div>
  </div>


  <!-- ÉTAPE 1 — URL -->
  <div class="step">
    <div class="step-label">
      <span class="step-num">1</span>
      Colle l'URL ou le texte de la recette
    </div>
    <div class="input-row">
      <textarea id="urlInput" placeholder="https://www.marmiton.org/... ou le texte de la recette"></textarea>
      <button class="btn btn-accent" id="prepareBtn">Analyser</button>
    </div>
  </div>

  <!-- ÉTAPE 2 — Choix IA + prompt -->
  <div class="step" id="step2" style="display:none">
    <div class="step-label">
      <span class="step-num">2</span>
      Envoie ce prompt à ton IA
    </div>
    <div class="ai-chips">
      <button class="ai-chip active" data-ai="chatgpt">ChatGPT</button>
      <button class="ai-chip" data-ai="gemini">Gemini</button>
    </div>
    <div class="prompt-box" id="promptBox"></div>
    <div class="btn-row">
      <button class="btn btn-accent" id="copyOpenBtn">📋 Copier &amp; ouvrir l'IA</button>
      <button class="btn btn-outline" id="copyOnlyBtn">Copier seulement</button>
    </div>
  </div>

  <!-- ÉTAPE 3 — Coller le JSON -->
  <div class="step" id="step3" style="display:none">
    <div class="step-label">
      <span class="step-num">3</span>
      Colle la réponse JSON ici
    </div>
    <textarea class="paste-area" id="jsonInput"
      placeholder='{"title":"Pâte à crêpes","servings":4,"prep_time":10,"cook_time":15,"main_cereal":"Blé tendre","ingredients":["225g de farine","3 oeufs"],"steps":["Mélanger la farine..."]}'
    ></textarea>
    <div class="btn-row">
      <button class="btn btn-accent" id="importBtn">Importer</button>
      <button class="btn btn-outline" id="resetBtn">Recommencer</button>
    </div>
  </div>

  <hr class="divider">

  <!-- LISTE DES RECETTES -->
  <div class="section-header">
    <div class="section-title">Mes recettes</div>
    <div class="filter-row">
      <input type="month" id="dateFilter" />
      <button class="btn btn-outline btn-sm" id="clearFilterBtn">✕</button>
    </div>
  </div>

  <div id="recipeContainer"></div>

  <footer style="margin-top: 40px; text-align: center; font-size: 9px; color: var(--text-muted); opacity: 0.6;">
    © 2026 PanierRecette · Données collectées anonymement pour l'amélioration du service.
  </footer>

</div>
<script src="app.js"></script>
</body>
</html>
